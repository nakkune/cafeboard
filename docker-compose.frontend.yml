version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: cafeboard-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/uploads:/usr/share/nginx/html/uploads

networks:
  default:
    name: cafeboard-network
