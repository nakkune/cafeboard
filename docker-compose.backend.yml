version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cafeboard-db
    environment:
      POSTGRES_USER: cafeboard
      POSTGRES_PASSWORD: cafeboard123
      POSTGRES_DB: cafeboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafeboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cafeboard-backend
    env_file:
      - ./backend/.env.docker
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - /app/node_modules

networks:
  default:
    name: cafeboard-network

volumes:
  postgres_data:
