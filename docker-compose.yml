version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cafeboard-db
    environment:
      POSTGRES_USER: cafeboard
      POSTGRES_PASSWORD: cafeboard123
      POSTGRES_DB: cafeboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafeboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cafeboard-backend
    env_file:
      - ./backend/.env.docker
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: cafeboard-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # ─── Jenkins 추가 ────────────────────────────────────
  jenkins:
    #image: jenkins/jenkins:lts-jdk17 # LTS 버전 사용, 최신 Java 17 기반
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins-local
    privileged: true
    user: root # 학습 편의를 위해 root 권한 부여 (실운영시에는 보안 설정 필요)
    # network_mode: "host" 를 추가합니다. (매우 중요)
    network_mode: "host"
    # ports는 주석 처리합니다. (호스트 모드에서는 무시됨)
    # ports:
    #   - "8080:8080"
    #   - "50000:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home # 데이터 보관을 위한 볼륨 매핑
      - /var/run/docker.sock:/var/run/docker.sock # Jenkins 안에서 Docker 명령을 쓰기 위함 (DIND)
      - ~/.kube/config:/root/.kube/config:ro # WSL2의 K8s 설정 파일을 Jenkins 내부로 연결 (출입증 전달)
      - /usr/local/bin/k3s:/usr/local/bin/k3s:ro # 호스트의 k3s 바이너리를 Jenkins 내부로 전달 (매우 중요)
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul # 시간대 설정

# ─── 볼륨 ───────────────────────────────────────────────      

volumes:
  postgres_data:
