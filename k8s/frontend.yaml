apiVersion: apps/v1
kind: Deployment
metadata:
  name: cafeboard-frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: cafeboard-frontend:latest # Jenkins에서 빌드할 이미지 명칭
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80 # Nginx 기본 포트
        env:
        - name: VITE_API_URL
          value: "http://172.19.92.78:30031" # localhost 대신 172.19.92.78 사용
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort # LoadBalancer에서 NodePort로 변경
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80 # 브라우저 내부용 포트
    targetPort: 80
    nodePort: 30080 # 외부에서 접속할 고정 포트 30080 지정
