# Oracle Database XE - 경량 이미지 버전
# gvenzl/oracle-xe: 공식 Oracle XE의 경량 버전 (인증 불필요)

apiVersion: v1
kind: Namespace
metadata:
  name: oracle
---
apiVersion: v1
kind: Secret
metadata:
  name: oracle-secret
  namespace: oracle
type: Opaque
stringData:
  ORACLE_PASSWORD: "Oracle123"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oracle-data
  namespace: oracle
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 15Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-xe
  namespace: oracle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oracle-xe
  template:
    metadata:
      labels:
        app: oracle-xe
    spec:
      containers:
      - name: oracle
        image: gvenzl/oracle-xe:21-slim  # 경량 버전 (~2GB)
        env:
        - name: ORACLE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: oracle-secret
              key: ORACLE_PASSWORD
        - name: ORACLE_DATABASE
          value: "XEPDB1"
        ports:
        - containerPort: 1521
          name: oracle
        - containerPort: 5500
          name: oem
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        volumeMounts:
        - name: data
          mountPath: /opt/oracle/oradata
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/$ORACLE_PASSWORD@XEPDB1 | grep -q '1'"
          initialDelaySeconds: 60
          periodSeconds: 30
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/$ORACLE_PASSWORD@XEPDB1 | grep -q '1'"
          initialDelaySeconds: 120
          periodSeconds: 60
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: oracle-data
---
apiVersion: v1
kind: Service
metadata:
  name: oracle-xe
  namespace: oracle
spec:
  selector:
    app: oracle-xe
  ports:
  - name: oracle
    port: 1521
    targetPort: 1521
  - name: oem
    port: 5500
    targetPort: 5500
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: oracle-xe-nodeport
  namespace: oracle
spec:
  selector:
    app: oracle-xe
  ports:
  - name: oracle
    port: 1521
    targetPort: 1521
    nodePort: 31521
  type: NodePort